/* \u2550\u2550\u2550 SCORECARD \u2550\u2550\u2550 */
/* ═══ GROUPED MATCH RENDERING ═══ */
function renderGroupedMatches(){
  const matches=state.matches;
  const rendered=new Set();
  let liveHtml='', doneHtml='';

  function renderGroup(m,i){
    if(rendered.has(i)) return;
    rendered.add(i);
    const children=matches
      .map((mc,ci)=>({mc,ci}))
      .filter(({mc,ci})=>!rendered.has(ci)&&mc.linkedFrom===m.id);
    let card='';
    if(children.length===0&&!m.linkedFrom){
      card=renderMatchCard(m,i);
    } else if(!m.linkedFrom){
      children.forEach(({ci})=>rendered.add(ci));
      card=renderGroupCard(m,i,children.map(({mc,ci})=>({m:mc,i:ci})));
    } else {
      card=renderMatchCard(m,i);
    }
    if(m.completedAt) doneHtml+=card;
    else liveHtml+=card;
  }

  matches.forEach((m,i)=>renderGroup(m,i));

  let out=liveHtml;
  if(doneHtml){
    out+=`<div style="margin:16px 0 8px;display:flex;align-items:center;gap:8px;">
      <div style="flex:1;height:1px;background:rgba(0,39,76,0.12);"></div>
      <span style="font-size:11px;font-weight:bold;text-transform:uppercase;letter-spacing:1px;color:rgba(0,39,76,0.35);">Completed</span>
      <div style="flex:1;height:1px;background:rgba(0,39,76,0.12);"></div>
    </div>`;
    // Completed cards shown at reduced opacity
    out+=`<div style="opacity:0.7;">${doneHtml}</div>`;
  }
  return out;
}

function renderGroupCard(parent,pi,children){
  const pRes=mResult(parent);
  const cn=parent.courseData?parent.courseData.name:(state.settings.courseData?state.settings.courseData.name:'');
  const pPlayed=Object.keys(parent.holes||{}).filter(h=>{const d=(parent.holes||{})[h];return d&&d.t1!=null&&d.t2!=null;}).length;
  const myPid=state.players.find(p=>p.name===state.myName)?.id;

  // Team match summary row
  let pDots='';
  for(let h=1;h<=parent.totalHoles;h++){
    const d=(parent.holes||{})[h];let cls='pending';
    if(d&&d.t1!=null&&d.t2!=null){cls=d.t1<d.t2?'win1':d.t2<d.t1?'win2':'halve';}
    const pDotBg=cls==="win1"?state.team1.color:cls==="win2"?state.team2.color:cls==="halve"?"rgba(0,39,76,0.25)":"rgba(0,39,76,0.08)";
    pDots+=`<div style="display:flex;flex-direction:column;align-items:center;gap:1px;"><span style="font-size:7px;color:rgba(0,39,76,0.35);font-family:Arial;font-weight:bold;line-height:1;">${h}</span><div class="hp-dot" style="background:${pDotBg};"></div></div>`;
  }
  const pSc=pRes.winner==='team1'?'status-t1':pRes.winner==='team2'?'status-t2':'status-as';
  let pt1t=0,pt2t=0,pt1any=false,pt2any=false;
  // t1/t2 on parent holes are already combined net (written by rollUpToTeamMatch)
  // so just sum them directly — no further stroke adjustment needed
  for(let h=1;h<=parent.totalHoles;h++){
    const d=(parent.holes||{})[h];if(!d)continue;
    if(d.t1!=null){pt1t+=d.t1;pt1any=true;}
    if(d.t2!=null){pt2t+=d.t2;pt2any=true;}
  }
  const canScoreParent=true;

  // Individual match rows
  const childRows=children.map(({m:cm,i:ci})=>{
    const cPids=cm.indPlayers||[];
    const cPlayers=cPids.map(id=>state.players.find(p=>p.id===id)).filter(Boolean);
    if(!cPlayers.length) return '';
    const canScoreChild=true;
    const minH=Math.min(...cPlayers.map(pl=>pl.handicap||0));
    const diffs=cPlayers.map(pl=>Math.round(((pl.handicap||0)-minH)*(cm.hdcpPercent||100)/100));
    const holes=matchHoles(cm);
    const pcolors=cPids.map(id=>AVC[state.players.findIndex(p=>p.id===id)%AVC.length]);
    const cSides=cm.indPlayerSides||{};

    // Build per-hole data
    const holeData=holes.map(h=>{
      const hd=cm.holes[h]||{};
      const _cd=cm.courseData||state.settings.courseData;
      const _ch=_cd&&_cd.holes&&_cd.holes[h-1]?_cd.holes[h-1]:null;
      const par=_ch?_ch.par:4;
      const si2=_ch?_ch.handicap:h;
      const si=holeSI(cm,h);
      const raws=cPlayers.map((_,pi)=>hd['p'+pi]!=null?hd['p'+pi]:null);
      const nets=cPlayers.map((_,pi)=>raws[pi]!=null?raws[pi]-strokesOn(diffs[pi],si,cm.totalHoles):null);
      const validNets=nets.filter(n=>n!==null);
      const minNet=validNets.length?Math.min(...validNets):null;
      const winnerPis=minNet!==null?nets.map((n,pi)=>n===minNet?pi:-1).filter(pi=>pi>=0):[];
      const outright=winnerPis.length===1;
      return{h,par,si,raws,nets,winnerPis,outright};
    });

    // Player totals
    const totals=cPlayers.map((_,pi)=>{
      let t=0,any=false;
      holeData.forEach(({raws})=>{if(raws[pi]!=null){t+=raws[pi];any=true;}});
      return{t,any};
    });

    // Build the inline score table — players as rows, holes as columns
    const front=holeData.slice(0,Math.min(9,holeData.length));
    const back=cm.totalHoles===18?holeData.slice(9):[];

    function buildBlock(hdList,label){
      if(!hdList.length) return '';
      let hdrH=`<th style="background:var(--blue);color:var(--maize);padding:4px 5px;font-size:10px;font-weight:bold;">${label}</th>`;
      let hdrPar=`<th style="background:var(--blue);color:rgba(255,255,255,0.5);padding:2px 4px;font-size:9px;font-weight:normal;">Par</th>`;
      hdList.forEach(({h,par})=>{
        hdrH+=`<th style="background:var(--blue);color:#fff;padding:4px 3px;font-size:11px;font-weight:bold;min-width:30px;">${h}</th>`;
        hdrPar+=`<th style="background:var(--blue);color:rgba(255,255,255,0.5);padding:2px 2px;font-size:9px;">${par}</th>`;
      });
      hdrH+=`<th style="background:var(--blue);color:var(--maize);padding:4px 4px;font-size:9px;">G</th>`;
      hdrH+=`<th style="background:var(--blue);color:rgba(255,203,5,0.7);padding:4px 4px;font-size:9px;">N</th>`;
      hdrPar+=`<th style="background:var(--blue);"></th><th style="background:var(--blue);"></th>`;

      const playerRowsHTML=cPlayers.map((p,pi)=>{
        const tc=cSides[p.id]==='2'?state.team2.color:state.team1.color;
        let row=`<td style="background:#fff;padding:4px 5px;white-space:nowrap;border-right:2px solid rgba(0,39,76,0.08);">
          <div style="display:flex;align-items:center;gap:4px;">
            <span style="width:8px;height:8px;border-radius:50%;background:${tc};display:inline-block;flex-shrink:0;"></span>
            <span style="font-size:11px;font-weight:bold;color:var(--blue);">${p.name}</span>
            <span style="font-size:9px;color:var(--text-muted);">HCP${p.handicap}${diffs[pi]>0?' +'+diffs[pi]:''}</span>
          </div>
        </td>`;
        hdList.forEach(({h,par,raws,nets,outright,winnerPis})=>{
          const raw=raws[pi];
          const net=nets[pi];
          const st=strokesOn(diffs[pi],holeSI(cm,h),cm.totalHoles);
          const isWinner=outright&&winnerPis[0]===pi&&raw!=null;
          // Stroke indicator: yellow dot above if player gets a stroke
          const strokeDot=st>0?`<div style="width:6px;height:6px;border-radius:50%;background:var(--maize);margin:0 auto 1px;border:1px solid rgba(0,39,76,0.2);"></div>`:'<div style="height:7px;"></div>';
          const diff2=raw!=null?raw-par:null;
          // Score shape styling
          let scoreHtml='—';
          if(raw!=null){
            const d=raw-par;
            if(d<=-2) scoreHtml=`<div style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;border:1.5px solid #1B5E20;"><div style="display:flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;border:1.5px solid #1B5E20;background:#e8f5e9;"><span style="font-size:9px;font-weight:bold;color:#1B5E20;">${raw}</span></div></div>`;
            else if(d===-1) scoreHtml=`<div style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;border:1.5px solid #2E7D32;background:#e8f5e9;"><span style="font-size:10px;font-weight:bold;color:#1B5E20;">${raw}</span></div>`;
            else if(d===0) scoreHtml=`<span style="font-size:12px;font-weight:bold;color:var(--blue);">${raw}</span>`;
            else if(d===1) scoreHtml=`<div style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:3px;border:1.5px solid #C0392B;"><span style="font-size:10px;font-weight:bold;color:#C0392B;">${raw}</span></div>`;
            else scoreHtml=`<div style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:4px;border:1.5px solid #C0392B;"><div style="display:flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:2px;border:1.5px solid #8B0000;background:#fdecea;"><span style="font-size:9px;font-weight:bold;color:#8B0000;">${raw}</span></div></div>`;
          }
          row+=`<td style="padding:1px 2px;border:1px solid rgba(0,39,76,0.06);${isWinner?'background:rgba(46,125,50,0.06);':''}text-align:center;vertical-align:middle;">
            ${strokeDot}
            ${scoreHtml}
          </td>`;
        });
        // Gross + Net totals
        const grossTot=totals[pi].any?totals[pi].t:'—';
        const netTot=totals[pi].any?cPlayers.reduce((_,__,pii)=>{
          let nt=0;
          hdList.forEach(({h,raws})=>{if(raws[pii]!=null)nt+=raws[pii]-strokesOn(diffs[pii],holeSI(cm,h),cm.totalHoles);});return nt;
        },0)-(function(){let n=0;hdList.forEach(({h,raws})=>{if(raws[pi]!=null)n+=raws[pi]-strokesOn(diffs[pi],holeSI(cm,h),cm.totalHoles);});return n;})():'—';
        // Simpler net total calc
        let netSum=0,hasNet=false;
        hdList.forEach(({h,raws})=>{if(raws[pi]!=null){netSum+=raws[pi]-strokesOn(diffs[pi],holeSI(cm,h),cm.totalHoles);hasNet=true;}});
        row+=`<td style="padding:3px 4px;background:rgba(0,39,76,0.04);text-align:center;border-left:1px solid rgba(0,39,76,0.1);font-size:12px;font-weight:bold;color:var(--blue);">${grossTot}</td>`;
        row+=`<td style="padding:3px 4px;background:rgba(0,39,76,0.06);text-align:center;font-size:12px;font-weight:bold;color:${hasNet&&netSum<(hdList.reduce((s,{par})=>s+par,0))?'#1B5E20':hasNet&&netSum>(hdList.reduce((s,{par})=>s+par,0))?'#C0392B':'var(--blue)'};">${hasNet?netSum:'—'}</td>`;
        return`<tr>${row}</tr>`;
      }).join('');

      return`<table style="border-collapse:collapse;width:100%;font-family:Arial;margin-bottom:4px;"><thead><tr>${hdrH}</tr><tr>${hdrPar}</tr></thead><tbody>${playerRowsHTML}</tbody></table>`;
    }

    const tableHTML=(cm.totalHoles===18?buildBlock(front,'Front')+buildBlock(back,'Back'):buildBlock(holeData,holeData[0]&&holeData[0].h>=10?'Back 9':'Front 9'));

    return`<div style="border-top:2px solid rgba(0,39,76,0.08);">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:5px 10px 3px;">
        <span style="font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);font-family:Arial;">Individual Scores</span>
        <div style="display:flex;gap:4px;">
          ${canScoreChild?`<button class="btn btn-sm btn-gold" onclick="openScorecard(${ci})" style="font-size:10px;padding:2px 8px;">✏️ Scores</button>`:''}
          ${state.isHost?`<button class="btn btn-sm btn-ghost" onclick="delMatch(${ci})" style="font-size:10px;color:#ff9aa2;border-color:rgba(255,150,150,0.3);padding:2px 6px;">✕</button>`:''}
        </div>
      </div>
      <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;">${tableHTML}</div>
    </div>`;
  }).join('');

  return`<div class="match-card" style="margin-bottom:10px;">
    <div class="match-card-header">
      <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0;">
        <span class="match-format-badge">${FORMATS[parent.format]||parent.format}</span>
        ${children.length>0?`<span style="font-size:10px;padding:2px 7px;border-radius:20px;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.85);font-family:Arial;">+ Individual</span>`:''}
        ${pRes.winner!==null?`<span style="font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(255,203,5,0.25);color:var(--maize);font-family:Arial;">Final</span>`:`<span style="font-size:10px;color:rgba(255,255,255,0.75);font-family:Arial;">${pPlayed}/${parent.totalHoles}</span>`}
        ${cn?`<span style="font-size:10px;color:#52c97a;font-family:Arial;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">⛳ ${cn}</span>`:''}
      </div>
      <div style="display:flex;gap:4px;">
        ${canScoreParent&&children.length===0?`<button class="btn btn-sm btn-gold" onclick="openScorecard(${pi})" style="padding:4px 10px;">✏️</button>`:''}
        <button class="btn btn-sm btn-ghost" onclick="openMatchBetModal(${pi})" style="color:var(--maize);border-color:rgba(255,203,5,0.4);padding:4px 8px;">💰</button>
        <button class="btn btn-sm btn-ghost" onclick="toggleCountsForTeam(${pi})" style="color:${parent.countsForTeam===false?'rgba(255,255,255,0.25)':'var(--maize)'};border-color:rgba(255,255,255,0.15);padding:4px 8px;">🏆</button>
        <button class="btn btn-sm btn-ghost" onclick="toggleComplete(${pi})" style="color:${parent.completedAt?'#2ECC40':'rgba(255,255,255,0.4)'};border-color:rgba(255,255,255,0.15);padding:4px 8px;">✓</button>
        <button class="btn btn-sm btn-ghost" onclick="openMatchModal(${pi})" style="color:#fff;border-color:rgba(255,255,255,0.2);padding:4px 8px;">✎</button>
        <button class="btn btn-sm btn-ghost" onclick="delMatch(${pi})" style="color:#ff9aa2;border-color:rgba(255,150,150,0.2);padding:4px 8px;">✕</button>
      </div>
    </div>
    <div class="match-body">
      <div class="match-players-col">
        <div class="match-player-row">
          <div class="player-color-dot" style="background:${state.team1.color};"></div>
          <div class="player-name-label" style="color:var(--blue);">${mLabel(parent,1)}</div>
          <div class="player-hdcp-tag">HCP ${avgHT(parent.team1Players)}</div>
          <div class="player-score-num" style="color:var(--blue);">${pPlayed>0?pt1t:'—'}</div>
        </div>
        <div class="match-player-row">
          <div class="player-color-dot" style="background:${state.team2.color};"></div>
          <div class="player-name-label" style="color:var(--blue);">${mLabel(parent,2)}</div>
          <div class="player-hdcp-tag">HCP ${avgHT(parent.team2Players)}</div>
          <div class="player-score-num" style="color:var(--blue);">${pPlayed>0?pt2t:'—'}</div>
        </div>
      </div>
      <div class="match-status-col">
        ${(()=>{
          // Derive colors from which state team the match's players belong to
          const mt1p=(parent.team1Players||[])[0];
          const mt1StateTeam=mt1p?allTeams().find(t=>t.players.includes(mt1p)):null;
          const mt2p=(parent.team2Players||[])[0];
          const mt2StateTeam=mt2p?allTeams().find(t=>t.players.includes(mt2p)):null;
          const mt1color=mt1StateTeam?mt1StateTeam.color:state.team1.color;
          const mt2color=mt2StateTeam?mt2StateTeam.color:state.team2.color;
          const pwc=pRes.winner==='team1'?mt1color:pRes.winner==='team2'?mt2color:'var(--blue)';
          const pLeader=pRes.winner||pRes.leading;
          const pLeaderColor=pLeader==='team1'?mt1color:pLeader==='team2'?mt2color:'var(--blue)';
          const phl=`<div style="font-size:10px;color:var(--text-muted);font-family:Arial;text-align:center;">${pRes.winner!==null?pRes.points+' pt'+(pRes.points!==1?'s':''):parent.totalHoles-pPlayed+' left'}</div>`;
          const psp=pPlayed?`<div style="font-size:14px;font-weight:bold;color:#fff;font-family:Arial;text-align:center;padding:4px 8px;border-radius:20px;background:${pLeaderColor};margin-bottom:2px;">${pRes.status}</div>`:'';
          return pLeader==='team2'?(phl+psp):(psp+phl);
        })()}
      </div>
    </div>
    <div class="hole-progress">${pDots}</div>
    ${children.length>0?`<div style="background:#fff;">${childRows}</div>`:''}
  </div>`;
}


/* Render a score cell with TV-style birdie/eagle circles and bogey squares */
function scoreCellStyle(score, par){
  // Returns {tdStyle, innerHtml} for rendering score in a table cell
  if(score == null) return {tdStyle:'background:#fafafa;border:1px solid rgba(0,39,76,0.08);', innerHtml:`<span style="font-size:15px;font-weight:bold;color:rgba(0,39,76,0.25);">${score!=null?score:''}</span>`};
  const diff = score - par;
  const num = `<span style="font-size:15px;font-weight:bold;">${score}</span>`;
  if(diff <= -2){
    // Eagle: number inside circle inside circle
    return{tdStyle:'background:#fff;border:1px solid rgba(0,39,76,0.08);',
      innerHtml:`<div style="display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;border:2px solid #1B5E20;"><div style="display:flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;border:2px solid #1B5E20;background:#e8f5e9;"><span style="font-size:14px;font-weight:bold;color:#1B5E20;">${score}</span></div></div>`};
  }
  if(diff === -1){
    // Birdie: number inside single circle
    return{tdStyle:'background:#fff;border:1px solid rgba(0,39,76,0.08);',
      innerHtml:`<div style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;border:2px solid #2E7D32;background:#e8f5e9;"><span style="font-size:14px;font-weight:bold;color:#1B5E20;">${score}</span></div>`};
  }
  if(diff === 0){
    // Par: plain number, subtle border
    return{tdStyle:'background:#fff;border:1px solid rgba(0,39,76,0.12);',
      innerHtml:`<span style="font-size:15px;font-weight:bold;color:var(--blue);">${score}</span>`};
  }
  if(diff === 1){
    // Bogey: number inside single square
    return{tdStyle:'background:#fff;border:1px solid rgba(0,39,76,0.08);',
      innerHtml:`<div style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:3px;border:2px solid #C0392B;"><span style="font-size:14px;font-weight:bold;color:#C0392B;">${score}</span></div>`};
  }
  // Double bogey+: number inside square inside square
  return{tdStyle:'background:#fff;border:1px solid rgba(0,39,76,0.08);',
    innerHtml:`<div style="display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:4px;border:2px solid #C0392B;"><div style="display:flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:2px;border:2px solid #8B0000;background:#fdecea;"><span style="font-size:14px;font-weight:bold;color:#8B0000;">${score}</span></div></div>`};
}

function openScrambleScorecard(mi, startHole){
  const m=state.matches[mi];
  if(!m) return;
  const cd=m.courseData||state.settings.courseData;
  const totalHoles=m.totalHoles||18;
  if(startHole==null){
    startHole=1;
    for(let h=1;h<=totalHoles;h++){const hd=(m.holes||{})[h];if(!hd||hd.t1==null||hd.t2==null){startHole=h;break;}}
  }
  const h=startHole;
  const ch=cd&&cd.holes&&cd.holes[h-1];
  const par=ch?ch.par:4;
  const si=ch?ch.handicap:h;
  const yds=ch?(ch.yardage||''):'';
  const hd=(m.holes||{})[h]||{};
  const teams=[
    {label:mLabel(m,1),color:state.team1.color,key:'t1',score:hd.t1},
    {label:mLabel(m,2),color:state.team2.color,key:'t2',score:hd.t2},
  ];
  function scoreGrid(t){
    const score=t.score;
    let html='<div style="display:grid;grid-template-columns:repeat(10,1fr) auto;gap:4px;">';
    for(let v=1;v<=10;v++){
      const sel=score===v;
      const d=v-par;
      let bg='#f5f5f5',bdr='transparent',col='var(--blue)',shape='border-radius:4px;';
      if(sel){
        if(d<=-2){bg='#e8f5e9';bdr='#1B5E20';col='#1B5E20';shape='border-radius:50%;outline:2px solid #1B5E20;outline-offset:2px;';}
        else if(d===-1){bg='#e8f5e9';bdr='#2E7D32';col='#1B5E20';shape='border-radius:50%;';}
        else if(d===0){bg='rgba(0,39,76,0.08)';bdr='var(--blue)';col='var(--blue)';}
        else if(d===1){bg='#fde8e8';bdr='#C0392B';col='#C0392B';shape='border-radius:4px;';}
        else{bg='#fde8e8';bdr='#8B0000';col='#8B0000';shape='border-radius:4px;outline:2px solid #8B0000;outline-offset:2px;';}
      }
      html+='<div onclick="setScrambleScore('+mi+','+h+'\''+t.key+'\','+v+','+par+')" style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;font-weight:bold;background:'+bg+';border:2px solid '+bdr+';'+shape+'color:'+col+';">'+v+'</div>';
    }
    html+='<div onclick="setScrambleScore('+mi+','+h+',\''+t.key+'\',null,'+par+')" style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:#C0392B;">&#10005;</div>';
    html+='</div>';
    return html;
  }
  const teamRows=teams.map(t=>'<div style="padding:16px;border-bottom:1px solid rgba(0,39,76,0.06);">'+
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">'+
      '<div style="width:12px;height:12px;border-radius:50%;background:'+t.color+';"></div>'+
      '<div style="font-size:15px;font-weight:bold;color:var(--blue);">'+t.label+'</div>'+
      (t.score!=null?'<div style="margin-left:auto;font-size:12px;color:var(--text-muted);">Score: '+t.score+'</div>':'')+
    '</div>'+
    scoreGrid(t)+
  '</div>').join('');
  const prevH=h>1?h-1:null;
  const nextH=h<totalHoles?h+1:null;
  modal='<div class="modal" style="padding:0;overflow:hidden;" onclick="event.stopPropagation()">'+
    '<div style="display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid rgba(0,39,76,0.08);">'+
      '<div style="flex:1;">'+
        '<div style="font-size:11px;color:var(--text-muted);">'+(FORMATS[m.format]||m.format)+'</div>'+
        '<div style="font-size:13px;font-weight:bold;color:var(--blue);">'+mLabel(m,1)+' vs '+mLabel(m,2)+'</div>'+
      '</div>'+
      '<button class="modal-close" onclick="closeModal()">&#10005;</button>'+
    '</div>'+
    '<div style="background:var(--blue);padding:14px 16px 12px;">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;">'+
        '<div style="font-size:28px;font-weight:900;color:#fff;">Hole '+h+'</div>'+
        '<div style="text-align:right;">'+
          '<span style="font-size:14px;color:var(--maize);font-weight:bold;">Par '+par+'</span>'+
          (si?' <span style="font-size:11px;color:rgba(255,255,255,0.6);">SI '+si+'</span>':'')+
          (yds?' <span style="font-size:11px;color:rgba(255,255,255,0.6);">'+yds+'y</span>':'')+
        '</div>'+
      '</div>'+
    '</div>'+
    teamRows+
    '<div style="display:flex;gap:8px;padding:12px 16px;">'+
      '<button class="btn btn-ghost w-full" '+(prevH?'onclick="openScrambleScorecard('+mi+','+prevH+')"':'disabled="true"')+'>&#8592; Prev</button>'+
      '<button class="btn btn-gold w-full" onclick="'+(nextH?'openScrambleScorecard('+mi+','+nextH+')':'closeModal()')+'">'+( nextH?'Next &#8594;':'Done')+'</button>'+
    '</div>'+
  '</div>';
  render();
}

function setScrambleScore(mi,h,key,score,par){
  mutate(()=>{
    const m=state.matches[mi];
    if(!m.holes[h]) m.holes[h]={};
    if(score==null) delete m.holes[h][key];
    else m.holes[h][key]=score;
    const ch=(m.courseData||state.settings.courseData);
    const chh=ch&&ch.holes&&ch.holes[h-1];
    if(chh) m.holes[h].par=chh.par;
  });
  openScrambleScorecard(mi,h);
}


function openScorecard(mi,startHole){
  const m=state.matches[mi];
  // Auto reroll all holes to team match when opening individual scorecard
  if(m&&m.linkedFrom){
    const holes=matchHoles(m);
    holes.forEach(h=>rollUpToTeamMatch(mi,h));
  }
  const isInd=m.matchType==='individual';
  const cd=m.courseData||state.settings.courseData;
  const holes=matchHoles(m);

  // Default to first hole without a score
  function firstEmpty(){
    return holes.find(h=>{
      const d=m.holes[h]||{};
      if(isInd) return (m.indPlayers||[]).every((_,pi)=>d['p'+pi]==null);
      return d.t1==null&&d.t2==null;
    })||holes[0];
  }
  const currentHole=startHole||firstEmpty();
  const holeIdx=holes.indexOf(currentHole);
  const prevHole=holeIdx>0?holes[holeIdx-1]:null;
  const nextHole=holeIdx<holes.length-1?holes[holeIdx+1]:null;

  function holeInfo(h){
    const hd2=m.holes[h]||{};
    const ch=cd&&cd.holes&&cd.holes[h-1]?cd.holes[h-1]:null;
    return{hd2, par:ch?ch.par:4, si:ch?ch.handicap:h};
  }

  const{hd2,par,si}=holeInfo(currentHole);
  const hd=hDiff(m), absHd=Math.abs(hd);
  const res=mResult(m);
  const sc=res.winner==='team1'?'status-t1':res.winner==='team2'?'status-t2':'status-as';

  // Progress dots
  let progressDots='';
  holes.forEach(h=>{
    const d=m.holes[h]||{};
    let cls='pending';
    if(isInd){
      const ipids=m.indPlayers||[];const ipls=ipids.map(id=>state.players.find(p=>p.id===id)).filter(Boolean);
      const iminH=ipls.length?Math.min(...ipls.map(p=>p.handicap||0)):0;
      const idiffs=ipls.map(p=>Math.round(((p.handicap||0)-iminH)*(m.hdcpPercent||100)/100));
      const isides=m.indPlayerSides||{};const hsi=holeSI(m,h);
      const nets=ipls.map((_,pi)=>{const r=d['p'+pi];if(r==null)return null;return r-strokesOn(idiffs[pi],hsi,m.totalHoles);});
      const valid=nets.filter(n=>n!==null);
      if(valid.length>=2){const mn=Math.min(...valid);const wi=nets.findIndex(n=>n===mn);const tied=nets.filter(n=>n===mn).length>1;cls=tied?'halve':isides[ipids[wi]]==='2'?'win2':'win1';}
    } else {
      if(d.t1!=null&&d.t2!=null){const hsi=holeSI(m,h),st=strokesOn(hd,hsi,m.totalHoles),t1n=d.t1-st;cls=t1n<d.t2?'win1':d.t2<t1n?'win2':'halve';}
    }
    const isCurrent=h===currentHole;
    const bg=isCurrent?'rgba(255,255,255,0.9)':cls==='win1'?state.team1.color:cls==='win2'?state.team2.color:cls==='halve'?'rgba(255,255,255,0.3)':'rgba(255,255,255,0.15)';

    <span style="font-size:10px;color:var(--text-dim);font-weight:bold;text-transform:uppercase;letter-spacing:0.5px;">Legend</span>
    <span style="font-size:11px;color:#1B5E20;border:2px solid #2E7D32;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-weight:bold;">B</span><span style="font-size:10px;color:var(--text-muted);">Birdie</span>
    <span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;border:2px solid #1B5E20;"><span style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;border:2px solid #1B5E20;background:#e8f5e9;font-size:9px;font-weight:bold;color:#1B5E20;">E</span></span><span style="font-size:10px;color:var(--text-muted);">Eagle</span>
    <span style="font-size:11px;color:#C0392B;border:2px solid #C0392B;border-radius:3px;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-weight:bold;">B</span><span style="font-size:10px;color:var(--text-muted);">Bogey</span>
    <span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:4px;border:2px solid #C0392B;"><span style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:2px;border:2px solid #8B0000;background:#fdecea;font-size:9px;font-weight:bold;color:#8B0000;">D</span></span><span style="font-size:10px;color:var(--text-muted);">Dbl+</span>
  </div>`;

  const courseName=cd?cd.name:'';

  modal=`<div class="modal" onclick="event.stopPropagation()" style="padding:0;overflow:hidden;">
    <!-- Top bar -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px 10px;border-bottom:2px solid var(--maize);">
      <div>
        <div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;">${FORMATS[m.format]||m.format}${courseName?' · '+courseName:''}</div>
        <div style="font-size:14px;font-weight:bold;color:var(--blue);margin-top:1px;">
          ${isInd?(m.indPlayers||[]).map(id=>state.players.find(p=>p.id===id)?.name).filter(Boolean).join(' · '):`${mLabel(m,1)} vs ${mLabel(m,2)}`}
        </div>

    <!-- Hole header -->
    <div style="background:var(--blue);padding:10px 14px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <div style="display:flex;align-items:baseline;gap:12px;">
          <span style="font-size:26px;font-weight:bold;color:#fff;line-height:1;">Hole ${currentHole}</span>
          <span style="font-size:14px;color:var(--maize);font-weight:bold;">Par ${par}</span>
          <span style="font-size:12px;color:rgba(255,255,255,0.55);">SI ${si}</span>
          ${absHd>0&&strokesOn(hd,si,m.totalHoles)!==0?`<span style="font-size:11px;color:rgba(255,255,255,0.5);">${hd<0?mLabel(m,1).split('/')[0]:mLabel(m,2).split('/')[0]} +${Math.abs(strokesOn(hd,si,m.totalHoles))}</span>`:''}
        </div>

          <div style="background:rgba(255,255,255,0.15);color:#fff;font-size:15px;font-weight:bold;padding:4px 10px;border-radius:20px;">${res.status}</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.45);margin-top:2px;">${holeIdx+1}/${holes.length}</div>

      :`<button class="btn btn-gold" onclick="closeModal()" style="flex:2;">✓ Done</button>`}
    </div>
  </div>`;
  render();
}

// Helpers that save then re-render the scorecard on same hole
function updHoleAndRefresh(mi,h,key,v,par){
  updHole(mi,h,key,v,par);
  // Brief delay so input value is committed before re-render
  setTimeout(()=>openScorecard(mi,h),50);
}
function updHoleIndAndRefresh(mi,h,pi,v,par){
  updHoleInd(mi,h,pi,'sc-'+mi+'-'+h+'-'+pi,v,par);
  setTimeout(()=>openScorecard(mi,h),50);
}
function rerollFromScorecard(mi){
  // Re-roll all holes from individual → team match, then re-render
  rerollAllHoles(mi);
}
function togglePinnieHole(mi,h,pid,add){
  const m=state.matches[mi];
  if(!m.holes[h]) m.holes[h]={};
  if(!m.holes[h].pinnies) m.holes[h].pinnies=[];
  if(add==='true'||add===true){if(!m.holes[h].pinnies.includes(pid))m.holes[h].pinnies.push(pid);}
  else{m.holes[h].pinnies=m.holes[h].pinnies.filter(id=>id!==pid);}
  save();pushToCloud();
  openScorecard(mi,h);
}
function toggleCtpHole(mi,h,pid,add){
  const m=state.matches[mi];
  if(!m.holes[h]) m.holes[h]={};
  const current=m.holes[h].ctp;
  m.holes[h].ctp=(add==='true'||add===true)?pid:null;
  save();pushToCloud();
  openScorecard(mi,h);
}

function dedupTees(cd){
  // Returns {tees, teeInfo, indexMap} with duplicates removed
  // indexMap[originalIdx] = dedupedIdx for remapping selectedTee/playerTees
  if(!cd||!cd.tees||!cd.tees.length) return{tees:[],teeInfo:[],indexMap:{}};
  const seen=new Set(), tees=[], teeInfo=[], indexMap={};
  cd.tees.forEach((name,i)=>{
    const key=(name||'').trim().toLowerCase();
    if(!key||seen.has(key)){indexMap[i]=tees.findIndex((_,j)=>(cd.tees[j]||'').trim().toLowerCase()===key)||0;return;}
    seen.add(key);
    indexMap[i]=tees.length;
    tees.push(name);
    if(cd.teeInfo&&cd.teeInfo[i]) teeInfo.push(cd.teeInfo[i]);
    else teeInfo.push({name,rating:0,slope:0,total_yards:0});
  });
  return{tees,teeInfo,indexMap};
}
function getTeeName(m){const cd=m.courseData||state.settings.courseData;if(!cd||!cd.tees)return'';return cd.tees[m.selectedTee||0]||'';}
function getHoleYards(m,h,pid){
  const cd=m.courseData||state.settings.courseData;
  if(!cd||!cd.holes||!cd.holes[h-1])return 0;
  const hole=cd.holes[h-1];
  const teeIdx=pid?(m.playerTees&&m.playerTees[pid]!=null?m.playerTees[pid]:m.selectedTee||0):(m.selectedTee||0);
  if(hole.tees&&hole.tees[teeIdx]!=null)return hole.tees[teeIdx];
  return hole.yards||0;
}
function getPlayerTeeName(m,pid){
  const cd=m.courseData||state.settings.courseData;
  if(!cd||!cd.tees)return'';
  const teeIdx=pid?(m.playerTees&&m.playerTees[pid]!=null?m.playerTees[pid]:m.selectedTee||0):(m.selectedTee||0);
  return cd.tees[teeIdx]||'';
}

function getScoreCls(s,par){if(s==null||s==='')return'';const d=parseInt(s)-parseInt(par);if(d<=-2)return'score-eagle';if(d===-1)return'score-birdie';if(d===1)return'score-bogey';if(d>=2)return'score-double';return'';}
function updHole(mi,h,t,v,par){
  const m=state.matches[mi];
  const cd=m.courseData||state.settings.courseData;
  const coursePar=cd&&cd.holes&&cd.holes[h-1]?cd.holes[h-1].par:par;
  if(!m.holes[h]) m.holes[h]={};
  m.holes[h].par=coursePar;
  m.holes[h][t]=v===''?null:parseInt(v);
  save();pushToCloud();
  const el=document.getElementById('sc-status');
  if(el){const res=mResult(m);const sc=res.winner==='team1'?'status-t1':res.winner==='team2'?'status-t2':'status-as';el.innerHTML=`<span class="status-bubble ${sc}" style="font-size:14px;">${res.status}</span>`;}
  // Update score cell color
  const inp=document.getElementById('sc-'+mi+'-'+h+'-'+t);
  if(inp) inp.className='sc-input '+getScoreCls(v===''?null:parseInt(v),coursePar);
}

/* \u2550\u2550\u2550 MATCH MODAL \u2550\u2550\u2550 */
function openMatchModal(idx){
  if(idx!=null){const m=state.matches[idx];matchDraft={editIdx:idx,format:m.format,totalHoles:m.totalHoles,hdcpPercent:m.hdcpPercent!=null?m.hdcpPercent:100,matchType:m.matchType||'teams',useNet:m.useNet,indPlayers:[...(m.indPlayers||[])],indPlayerSides:{...(m.indPlayerSides||{})},linkedTeamMatch:false,createIndividuals:false,pairings:[],team1Players:[...(m.team1Players||[])],team2Players:[...(m.team2Players||[])],notes:m.notes||'',courseData:m.courseData||null,selectedTee:m.selectedTee||0,playerTees:{...(m.playerTees||{})}};}
  else matchDraft={editIdx:null,format:'fourball',totalHoles:state.settings.holes||18,hdcpPercent:100,matchType:'teams',indPlayers:[],indPlayerSides:{},linkedTeamMatch:false,team1Players:[],team2Players:[],notes:'',courseData:state.settings.courseData||null,selectedTee:0,playerTees:{}};
  renderMatchModal();
}
function renderMatchModal(){
  const d=matchDraft,isEdit=d.editIdx!=null;
  const allPlayers=state.players;
  const t1pids=state.team1.players||[],t2pids=state.team2.players||[];
  const assigned=new Set([...t1pids,...t2pids,...(state.extraTeams||[]).flatMap(t=>t.players||[])]);
  const unassigned=allPlayers.filter(p=>!assigned.has(p.id));
  const isInd=d.matchType==='individual';
  const cn=d.courseData?d.courseData.name:(state.settings.courseData?state.settings.courseData.name:'');
  const cd=d.courseData||state.settings.courseData;
  // Per-player tee selector — build list of all players in this match
  const matchPids=isInd?[...(d.indPlayers||[])]:[...(d.team1Players||[]),...(d.team2Players||[])];
  const matchPlayers=matchPids.map(id=>state.players.find(p=>p.id===id)).filter(Boolean);
  const {tees:dtees,teeInfo:dteeInfo}=dedupTees(cd);
  const teeSel=dtees.length>0?(()=>{
    if(dtees.length===1) return`<div class="form-group"><label class="form-label">Tee</label><div style="font-size:13px;color:var(--blue);padding:4px 0;font-weight:bold;">${dtees[0]}</div></div>`;
    const players=matchPlayers.length>0?matchPlayers:[];
    if(!players.length) return`<div class="form-group"><label class="form-label">Default Tee</label><div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;">${dtees.map((t,i)=>{const sel=(d.selectedTee||0)===i;const tInfo=dteeInfo[i];const yds=tInfo&&tInfo.total_yards?tInfo.total_yards:(cd&&cd.holes?cd.holes.reduce((s,h)=>s+(h.tees&&h.tees[i]?h.tees[i]:0),0):0);return`<div onclick="draftSet('selectedTee',${i})" style="flex-shrink:0;padding:7px 14px;border-radius:20px;border:2px solid ${sel?'var(--blue)':'rgba(0,39,76,0.15)'};background:${sel?'var(--blue)':'#fff'};cursor:pointer;text-align:center;min-width:64px;"><div style="font-size:13px;font-weight:bold;color:${sel?'#fff':'var(--blue)'};">${t}</div><div style="font-size:10px;color:${sel?'rgba(255,255,255,0.8)':'var(--text-muted)'};">${yds?yds+'y':'—'}</div></div>`;}).join('')}</div></div>`;
    return`<div class="form-group"><label class="form-label">Tees</label><div style="border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;">${players.map((p,idx)=>{
      const ac=AVC[state.players.findIndex(pl=>pl.id===p.id)%AVC.length];
      const curTee=(d.playerTees||{})[p.id]!=null?(d.playerTees||{})[p.id]:(d.selectedTee||0);
      return`<div style="display:flex;align-items:center;padding:10px 12px;${idx>0?'border-top:1px solid rgba(0,39,76,0.07)':''};">
        <div style="display:flex;align-items:center;gap:7px;width:90px;flex-shrink:0;">
          <span style="width:9px;height:9px;border-radius:50%;background:${ac};flex-shrink:0;"></span>
          <div>
            <div style="font-size:13px;font-weight:bold;color:var(--blue);line-height:1.2;">${p.name}</div>
            <div style="font-size:10px;color:var(--text-muted);">HCP ${p.handicap}</div>
          </div>
        </div>
        <div style="flex:1;display:flex;gap:5px;overflow-x:auto;padding:2px 0;-webkit-overflow-scrolling:touch;">
          ${dtees.map((t,i)=>{const sel=curTee===i;const tInfo=dteeInfo[i];const yds=tInfo&&tInfo.total_yards?tInfo.total_yards:(cd&&cd.holes?cd.holes.reduce((s,h)=>s+(h.tees&&h.tees[i]?h.tees[i]:0),0):0);return`<div onclick="setPlayerTee('${p.id}',${i})" style="flex-shrink:0;padding:6px 12px;border-radius:20px;border:2px solid ${sel?'var(--blue)':'rgba(0,39,76,0.15)'};background:${sel?'var(--blue)':'#fff'};cursor:pointer;text-align:center;min-width:60px;"><div style="font-size:12px;font-weight:bold;color:${sel?'#fff':'var(--blue)'};">${t}</div><div style="font-size:10px;color:${sel?'rgba(255,255,255,0.8)':'var(--text-muted)'};">${yds?yds+'y':'—'}</div></div>`;}).join('')}
        </div>
      </div>`;
    }).join('')}</div></div>`;
  })():'';
  const fmtDesc=FORMAT_DESC[d.format]||'';
  // Player pickers
  function chips(ids,color){if(!ids.length)return`<span style="font-size:11px;color:var(--text-dim);font-family:Arial;">None</span>`;return ids.map(id=>{const p=allPlayers.find(pl=>pl.id===id);return p?`<span class="selected-chip" style="background:${color}22;color:${color};border:1px solid ${color}44;">${p.name}</span>`:''}).join('');}
  function playerPicker(ids,color,name,side){
    if(!ids.length)return'';
    return`<div class="team-section-label" style="color:${color};">${name}</div>`+ids.map(p=>{const sel=d[side+'Players']&&d[side+'Players'].includes(p.id);const ac=AVC[allPlayers.findIndex(pl=>pl.id===p.id)%AVC.length];const init=p.name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
      return`<div class="player-pick-item ${sel?'selected':''}" onclick="togglePick('${p.id}','${side}')"><div class="pick-check">${sel?'✓':''}</div><div class="player-avatar" style="width:24px;height:24px;font-size:10px;background:${ac}22;color:${ac};">${init}</div><div style="flex:1;font-size:12px;font-family:Arial;">${p.name}</div><div style="font-size:11px;color:var(--text-muted);font-family:Arial;">HCP ${p.handicap}</div></div>`;}).join('');
  }
  const t1p=t1pids.map(id=>allPlayers.find(p=>p.id===id)).filter(Boolean);
  const t2p=t2pids.map(id=>allPlayers.find(p=>p.id===id)).filter(Boolean);
  // Individual player picker for ind matches
  function indPlayerRow(p){
    const pi=d.indPlayers.indexOf(p.id);
    const sel=pi>=0;
    const side=sel?(d.indPlayerSides[p.id]||'1'):'1';
    const ac=AVC[allPlayers.findIndex(pl=>pl.id===p.id)%AVC.length];
    const init=p.name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
    return`<div class="player-pick-item ${sel?'selected':''}" style="cursor:pointer;">
      <div onclick="toggleIndPlayer('${p.id}')" class="pick-check">${sel?'✓':''}</div>
      <div class="player-avatar" style="width:24px;height:24px;font-size:10px;background:${ac}22;color:${ac};" onclick="toggleIndPlayer('${p.id}')">${init}</div>
      <div style="flex:1;font-size:12px;font-family:Arial;" onclick="toggleIndPlayer('${p.id}')">${p.name} <span style="color:var(--text-muted);">HCP ${p.handicap}</span></div>
      ${sel?`<div style="display:flex;gap:3px;">
        <div onclick="setIndSide('${p.id}','1')" style="padding:2px 8px;border-radius:10px;font-size:10px;cursor:pointer;background:${side==='1'?state.team1.color:'rgba(0,39,76,0.08)'};color:${side==='1'?'#fff':'var(--blue)'};">${state.team1.name}</div>
        <div onclick="setIndSide('${p.id}','2')" style="padding:2px 8px;border-radius:10px;font-size:10px;cursor:pointer;background:${side==='2'?state.team2.color:'rgba(0,39,76,0.08)'};color:${side==='2'?'#fff':'var(--blue)'};">${state.team2.name}</div>
      </div>`:''}
    </div>`;
  }
  modal=`<div class="modal" onclick="event.stopPropagation()" style="max-height:90vh;overflow-y:auto;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;position:sticky;top:0;background:#fff;z-index:1;padding-bottom:8px;border-bottom:2px solid var(--maize);">
      <div class="modal-title">${isEdit?'Edit Match':'New Match'}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Format</label>
      <select onchange="draftSet('format',this.value)">
        ${Object.entries(FORMATS).map(([k,v])=>`<option value="${k}" ${d.format===k?'selected':''}>${v}</option>`).join('')}
      </select>
      ${fmtDesc?`<div style="font-size:11px;color:var(--text-muted);font-family:Arial;margin-top:4px;padding:6px 8px;background:rgba(0,39,76,0.04);border-radius:var(--radius);">${fmtDesc}</div>`:''}
    </div>
    <div class="grid-2" style="margin-bottom:12px;">
      <div class="form-group" style="margin-bottom:0;"><label class="form-label">Holes</label>
        <select onchange="draftSet('totalHoles',parseInt(this.value))"><option value="18" ${d.totalHoles===18?'selected':''}>18 Holes</option><option value="9" ${d.totalHoles===9?'selected':''}>9 Holes</option></select></div>
      <div class="form-group" style="margin-bottom:0;"><label class="form-label">Handicap Allowance</label>
        <select onchange="draftSet('hdcpPercent',parseInt(this.value))"><option value="100" ${d.hdcpPercent===100?'selected':''}>100%</option><option value="75" ${d.hdcpPercent===75?'selected':''}>75%</option><option value="50" ${d.hdcpPercent===50?'selected':''}>50%</option><option value="0" ${d.hdcpPercent===0?'selected':''}>Scratch</option></select></div>
    </div>
    <div class="form-group">
      <label class="form-label">Course</label>
      ${cn
        ? `<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(0,39,76,0.04);border:1px solid rgba(0,39,76,0.12);border-radius:var(--radius);">
            <span style="font-size:13px;font-weight:bold;color:var(--blue);flex:1;">⛳ ${cn}</span>
            <button class="btn btn-sm btn-ghost" onclick="openCourseSearch(0)" style="flex-shrink:0;">Change</button>
            <button class="btn btn-sm btn-ghost" onclick="draftSet('courseData',null)" style="color:#C0392B;flex-shrink:0;">✕</button>
          </div>`
        : `<button class="btn btn-gold w-full" onclick="openCourseSearch(0)" style="font-size:13px;">🔍 Search &amp; Select Course</button>
           <div style="font-size:11px;color:var(--text-muted);font-family:Arial;margin-top:4px;text-align:center;">Select a course to get hole pars, distances &amp; stroke indexes</div>`
      }
    </div>
    ${teeSel}
    <div class="form-group">
      <label class="form-label">Match Type</label>
      <div style="display:flex;gap:8px;margin-bottom:6px;">
        <div onclick="draftSet('matchType','teams')" style="flex:1;padding:10px 8px;border-radius:var(--radius);border:2px solid ${!isInd?'var(--blue)':'var(--border)'};background:${!isInd?'rgba(0,39,76,0.08)':'#fff'};cursor:pointer;text-align:center;">
          <div style="font-size:13px;font-weight:bold;color:${!isInd?'var(--blue)':'var(--text-muted)'};">🏆 Team</div>
        </div>
        <div onclick="draftSet('matchType','individual')" style="flex:1;padding:10px 8px;border-radius:var(--radius);border:2px solid ${isInd?'var(--blue)':'var(--border)'};background:${isInd?'rgba(0,39,76,0.08)':'#fff'};cursor:pointer;text-align:center;">
          <div style="font-size:13px;font-weight:bold;color:${isInd?'var(--blue)':'var(--text-muted)'};">👤 Individual</div>
        </div>
      </div>
      <div style="font-size:11px;color:var(--text-muted);font-family:Arial;padding:6px 8px;background:rgba(0,39,76,0.04);border-radius:var(--radius);">
        ${!isInd?'Players compete as two sides — one score per team per hole (or lowest ball for Four-Ball).':'Each player tracks their own score. Assign players to sides for match play result.'}
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Scoring</label>
      <div style="display:flex;gap:8px;">
        <div onclick="draftSet('useNet',false)" style="flex:1;padding:10px 8px;border-radius:var(--radius);border:2px solid ${!d.useNet?'var(--blue)':'var(--border)'};background:${!d.useNet?'rgba(0,39,76,0.08)':'#fff'};cursor:pointer;text-align:center;">
          <div style="font-size:13px;font-weight:bold;color:${!d.useNet?'var(--blue)':'var(--text-muted)'};">Gross</div>
        </div>
        <div onclick="draftSet('useNet',true)" style="flex:1;padding:10px 8px;border-radius:var(--radius);border:2px solid ${d.useNet?'var(--blue)':'var(--border)'};background:${d.useNet?'rgba(0,39,76,0.08)':'#fff'};cursor:pointer;text-align:center;">
          <div style="font-size:13px;font-weight:bold;color:${d.useNet?'var(--blue)':'var(--text-muted)'};">Net</div>
        </div>
      </div>
      <div style="font-size:11px;color:var(--text-muted);padding:6px 8px;background:rgba(0,39,76,0.04);border-radius:var(--radius);margin-top:4px;">
        ${d.useNet?'Net scores used — handicap strokes applied per hole for win/loss.':'Gross scores used — raw scores compared with no handicap adjustment.'}
      </div>
    </div>
    ${!isInd?`
    <div class="grid-2" style="gap:12px;margin-bottom:12px;">
      <div><label class="form-label" style="color:${state.team1.color};">${state.team1.name} side</label>
        <div class="selected-players-display" style="background:rgba(0,39,76,0.04);border-radius:var(--radius);padding:6px 8px;min-height:32px;margin-bottom:6px;">${chips(d.team1Players,state.team1.color)}</div>
        <div class="player-picker">${playerPicker(t1p,state.team1.color,state.team1.name,'team1')}${unassigned.length?playerPicker(unassigned,'var(--text-muted)','Unassigned','team1'):''}</div>
      </div>
      <div><label class="form-label" style="color:${state.team2.color};">${state.team2.name} side</label>
        <div class="selected-players-display" style="background:rgba(0,39,76,0.04);border-radius:var(--radius);padding:6px 8px;min-height:32px;margin-bottom:6px;">${chips(d.team2Players,state.team2.color)}</div>
        <div class="player-picker">${playerPicker(t2p,state.team2.color,state.team2.name,'team2')}${unassigned.length?playerPicker(unassigned,'var(--text-muted)','Unassigned','team2'):''}</div>
      </div>
    </div>`:
    `<div class="form-group"><label class="form-label">Players (tap to add, assign to team side)</label>
      <div class="player-picker">${allPlayers.map(p=>indPlayerRow(p)).join('')}</div>
    </div>
    <div style="padding:8px;background:rgba(0,39,76,0.04);border-radius:var(--radius);margin-bottom:12px;">
      <div onclick="matchDraft.linkedTeamMatch=!matchDraft.linkedTeamMatch;renderMatchModal();" style="display:flex;align-items:center;gap:12px;cursor:pointer;padding:4px 0;">
        <div style="width:48px;height:28px;border-radius:14px;background:${d.linkedTeamMatch?'var(--blue)':'rgba(0,39,76,0.15)'};flex-shrink:0;position:relative;transition:background 0.2s;">
          <div style="position:absolute;top:3px;${d.linkedTeamMatch?'right:3px':'left:3px'};width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.25);transition:all 0.2s;"></div>
        </div>
        <div style="flex:1;">
          <div style="font-weight:bold;color:var(--blue);font-size:13px;">Also create Team Match</div>
          <div style="font-size:11px;color:var(--text-muted);">Best individual score per side feeds into a linked team match automatically</div>
        </div>
      </div>
    </div>`}
    ${!isInd&&!isEdit?`<div style="padding:8px;background:rgba(0,39,76,0.04);border-radius:var(--radius);margin-bottom:12px;">
      <div onclick="matchDraft.createIndividuals=!matchDraft.createIndividuals;renderMatchModal();" style="display:flex;align-items:center;gap:12px;cursor:pointer;padding:4px 0;">
        <div style="width:48px;height:28px;border-radius:14px;background:${d.createIndividuals?'var(--blue)':'rgba(0,39,76,0.15)'};flex-shrink:0;position:relative;transition:background 0.2s;">
          <div style="position:absolute;top:3px;${d.createIndividuals?'right:3px':'left:3px'};width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,0.25);transition:all 0.2s;"></div>
        </div>
        <div style="flex:1;">
          <div style="font-weight:bold;color:var(--blue);font-size:13px;">Also create Individual Match</div>
          <div style="font-size:11px;color:var(--text-muted);">Each player tracks their own score — best score per side rolls up to this team match</div>
        </div>
      </div>
    </div>`:''}
    ${!isInd&&!isEdit?`<div class="form-group">
      <label class="form-label">1v1 Side Matches <span style="font-size:10px;font-weight:normal;color:var(--text-muted);">optional — scores roll up from individual match</span></label>
      <div style="border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;">
        ${(d.pairings||[]).length===0?'<div style="padding:10px 12px;font-size:12px;color:var(--text-muted);">None yet</div>':''}
        ${(d.pairings||[]).map((pair,pi)=>{const p1=state.players.find(p=>p.id===pair[0]);const p2=state.players.find(p=>p.id===pair[1]);return`<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid rgba(0,39,76,0.06);"><span style="font-size:13px;font-weight:bold;color:var(--blue);">${p1?p1.name:'?'}<span style="color:var(--text-muted);font-weight:normal;"> vs </span>${p2?p2.name:'?'}</span><button onclick="removePairing(${pi})" style="margin-left:auto;background:none;border:none;color:#C0392B;cursor:pointer;font-size:16px;">✕</button></div>`;}).join('')}
      </div>
      ${(d.team1Players||[]).concat(d.team2Players||[]).length>=2?`<div style="display:flex;gap:6px;align-items:center;">
        <select id="pair-p1" style="flex:1;font-size:13px;padding:8px;border:1.5px solid rgba(0,39,76,0.2);border-radius:var(--radius);"><option value="">Player 1</option>${(d.team1Players||[]).concat(d.team2Players||[]).map(id=>{const p=state.players.find(pl=>pl.id===id);return p?`<option value="${id}">${p.name}</option>`:'';}).join('')}</select>
        <span style="color:var(--text-muted);flex-shrink:0;">vs</span>
        <select id="pair-p2" style="flex:1;font-size:13px;padding:8px;border:1.5px solid rgba(0,39,76,0.2);border-radius:var(--radius);"><option value="">Player 2</option>${(d.team1Players||[]).concat(d.team2Players||[]).map(id=>{const p=state.players.find(pl=>pl.id===id);return p?`<option value="${id}">${p.name}</option>`:'';}).join('')}</select>
        <button class="btn btn-sm btn-gold" onclick="addPairing()" style="flex-shrink:0;">+ Add</button>
      </div>`:'<div style="font-size:11px;color:var(--text-muted);">Add players to both teams first</div>'}
    </div>`:''}
    <div class="form-group"><label class="form-label">Notes</label><input type="text" value="${d.notes||''}" onchange="draftSet('notes',this.value)" onblur="draftSet('notes',this.value)" placeholder="e.g. Morning wave, Group A"></div>
    <button class="btn btn-gold w-full" onclick="saveMatch()">${isEdit?'Save Changes':'Create Match'}</button>
  </div>`;render();
}
function draftSet(k,v){matchDraft[k]=v;renderMatchModal();}
function setPlayerTee(pid,teeIdx){
  if(!matchDraft.playerTees) matchDraft.playerTees={};
  matchDraft.playerTees[pid]=teeIdx;
  renderMatchModal();
}
function toggleIndPlayer(pid){
  if(!matchDraft.indPlayers) matchDraft.indPlayers=[];
  if(!matchDraft.indPlayerSides) matchDraft.indPlayerSides={};
  const idx=matchDraft.indPlayers.indexOf(pid);
  if(idx>=0){matchDraft.indPlayers.splice(idx,1);delete matchDraft.indPlayerSides[pid];}
  else{matchDraft.indPlayers.push(pid);matchDraft.indPlayerSides[pid]='1';}
  renderMatchModal();
}
function setIndSide(pid,side){
  if(!matchDraft.indPlayerSides) matchDraft.indPlayerSides={};
  matchDraft.indPlayerSides[pid]=side;
  renderMatchModal();
}
function togglePick(pid,side){const a=matchDraft[side+'Players'],i=a.indexOf(pid);if(i>=0)a.splice(i,1);else a.push(pid);renderMatchModal();}
function toggleComplete(i){
  mutate(()=>{
    const m=state.matches[i];
    m.completedAt=m.completedAt?null:new Date().toISOString();
    state.matches.forEach(lm=>{
      if(lm.linkedFrom===m.id||lm.parentIndMatch===m.id){
        lm.completedAt=m.completedAt;
      }
    });
  });
  render();
}

function toggleCountsForTeam(i){
  mutate(()=>{
    const m=state.matches[i];
    m.countsForTeam=m.countsForTeam===false?true:false;
  });
  render();
}


function addPairing(){
  const p1=(document.getElementById('pair-p1')||{}).value;
  const p2=(document.getElementById('pair-p2')||{}).value;
  if(!p1||!p2||p1===p2){alert('Select two different players.');return;}
  if(!matchDraft.pairings) matchDraft.pairings=[];
  if(matchDraft.pairings.some(p=>p[0]===p1&&p[1]===p2||p[0]===p2&&p[1]===p1)){alert('Pairing already exists.');return;}
  matchDraft.pairings.push([p1,p2]);
  renderMatchModal();
}
function removePairing(pi){
  if(matchDraft.pairings) matchDraft.pairings.splice(pi,1);
  renderMatchModal();
}

function saveMatch(){
  const d=matchDraft;
  const isInd=d.matchType==='individual';
  mutate(()=>{
    const base={
      format:d.format,totalHoles:d.totalHoles,hdcpPercent:d.hdcpPercent,
      matchType:d.matchType||'teams',
      notes:d.notes||'',courseData:d.courseData,selectedTee:d.selectedTee||0,
      playerTees:{...(d.playerTees||{})},
      matchBets:[]
    };
    if(d.editIdx!=null){
      // Edit existing — preserve holes (scores already entered)
      const existing=state.matches[d.editIdx];
      const savedHoles=existing.holes||{};
      Object.assign(existing,base);
      existing.holes=savedHoles; // restore scores
      if(isInd){
        existing.indPlayers=d.indPlayers||[];
        existing.indPlayerSides=d.indPlayerSides||{};
        existing.team1Players=(d.indPlayers||[]).filter(id=>(d.indPlayerSides||{})[id]!=='2');
        existing.team2Players=(d.indPlayers||[]).filter(id=>(d.indPlayerSides||{})[id]==='2');
      } else {
        existing.team1Players=d.team1Players||[];
        existing.team2Players=d.team2Players||[];
        existing.indPlayers=[];existing.indPlayerSides={};
      }
      existing.matchBets=existing.matchBets||[];
      // If there's a linked individual match, update its format/handicap too
      state.matches.forEach(lm=>{
        if(lm.linkedFrom===existing.id){
          lm.format=existing.format;
          lm.hdcpPercent=existing.hdcpPercent;
          lm.totalHoles=existing.totalHoles;
          lm.courseData=existing.courseData;
          lm.selectedTee=existing.selectedTee;
          lm.playerTees=existing.playerTees;
        }
      });
    } else {
      // New match
      const indMatchId='m'+Date.now();
      if(isInd){
        const t1pids=(d.indPlayers||[]).filter(id=>(d.indPlayerSides||{})[id]!=='2');
        const t2pids=(d.indPlayers||[]).filter(id=>(d.indPlayerSides||{})[id]==='2');
        state.matches.push({
          id:indMatchId,...base,
          indPlayers:d.indPlayers||[],
          indPlayerSides:d.indPlayerSides||{},
          team1Players:t1pids,
          team2Players:t2pids,
          holes:{}
        });
        // Optionally create linked team match
        if(d.linkedTeamMatch){
          state.matches.push({
            id:'m'+(Date.now()+1),...base,
            matchType:'teams',
            indPlayers:[],indPlayerSides:{},
            team1Players:t1pids,
            team2Players:t2pids,
            notes:(d.notes?d.notes+' ':'')+'(Team)',
            linkedFrom:indMatchId,
            holes:{}
          });
        }
      } else {
        const teamMatchId=indMatchId;
        state.matches.push({
          id:teamMatchId,...base,
          indPlayers:[],indPlayerSides:{},
          team1Players:d.team1Players||[],
          team2Players:d.team2Players||[],
          holes:{}
        });
        // Optionally create ONE multi-player individual match — all players, each plays own ball
        let indMatchId2=null;
        if(d.createIndividuals){
          const allPids=[...(d.team1Players||[]),...(d.team2Players||[])];
          if(allPids.length>=2){
            const sides={};
            allPids.forEach(id=>{sides[id]=(d.team1Players||[]).includes(id)?'1':'2';});
            indMatchId2='m'+(Date.now()+1);
            state.matches.push({
              id:indMatchId2,...base,
              format:d.format,
              matchType:'individual',
              indPlayers:allPids,
              indPlayerSides:sides,
              team1Players:d.team1Players||[],
              team2Players:d.team2Players||[],
              notes:(d.notes?d.notes+' ':'')+'Individual',
              linkedFrom:teamMatchId,
              holes:{}
            });
          }
        }
        // Create 1v1 linked matches from pairings
        (d.pairings||[]).forEach((pair,pi)=>{
          const [pid1,pid2]=pair;
          const p1=state.players.find(p=>p.id===pid1);
          const p2=state.players.find(p=>p.id===pid2);
          if(!p1||!p2) return;
          const sides={[pid1]:'1',[pid2]:'2'};
          // Figure out which parent individual match has these players
          const parentId=indMatchId2||teamMatchId;
          state.matches.push({
            id:'m'+(Date.now()+2+pi),...base,
            format:d.format,
            matchType:'individual',
            is1v1:true,
            indPlayers:[pid1,pid2],
            indPlayerSides:sides,
            team1Players:[pid1],
            team2Players:[pid2],
            notes:p1.name.split(' ')[0]+' vs '+p2.name.split(' ')[0],
            linkedFrom:parentId,
            parentIndMatch:indMatchId2||null,
            holes:{}
          });
        });
      }
    }
  });
  modal=null;matchDraft=null;pushToCloud();render();
}

function applyCourse(course,fs){

  if(typeof course==='string'){try{course=JSON.parse(course);}catch(e){}}
  // fs can arrive as boolean false, 0, "false", or "0" — treat all falsy + "false"/"0" as settings=false
  const forSettings=(fs&&fs!=='false'&&fs!==0&&fs!=='0');
  const clean={name:course.name,location:course.location||'',total_par:course.total_par,holes:course.holes||[],tees:course.tees||null,teeInfo:course.teeInfo||null};

/* ═══ GAME POOLS ═══ */
function getPools(){return state.pools||(state.pools={pinnies:{active:false,amount:5,participants:[]},ctp:{active:false,amount:10,participants:[]},birdies:{active:false,amount:2,participants:[]},skins:{active:false,amount:5,participants:[]}});}

function playerBirdies(pid){
  // Counts any score at or below par-1 (birdie, eagle, albatross etc.)
  return state.matches.reduce((n,m)=>{
    const pids=m.indPlayers||[];const pi=pids.indexOf(pid);
    const isInd=m.matchType==='individual';
    return n+Object.values(m.holes||{}).filter(hd=>{
      const par=hd.par||4;
      // Individual match — player has their own score (p0, p1, etc.)
      if(isInd) return pi>=0&&hd['p'+pi]!=null&&hd['p'+pi]<=par-1;
      // Team match — score is shared; attribute to all players on that side
      const onT1=(m.team1Players||[]).includes(pid);
      const onT2=(m.team2Players||[]).includes(pid);
      if(onT1&&hd.t1!=null&&hd.t1<=par-1) return true;
      if(onT2&&hd.t2!=null&&hd.t2<=par-1) return true;
      return false;
    }).length;
  },0);
}

function calcSkinsWinner(matchIdx){
  // Returns array of {hole, winnerId} for each hole with an outright skins winner
  const m=state.matches[matchIdx];
  if(!m) return[];
  const results=[];
  const pids=m.indPlayers||[];
  const sides=m.indPlayerSides||{};
  const isInd=m.matchType==='individual';
  for(let h=1;h<=m.totalHoles;h++){
    const hd=m.holes[h]||{};
    let scores=[];
    if(isInd){
      pids.forEach((pid,pi)=>{if(hd['p'+pi]!=null)scores.push({pid,score:hd['p'+pi]});});
    } else {
      (m.team1Players||[]).forEach(pid=>{if(hd.t1!=null)scores.push({pid,score:hd.t1});});
      (m.team2Players||[]).forEach(pid=>{if(hd.t2!=null)scores.push({pid,score:hd.t2});});
    }
    if(!scores.length) continue;
    const min=Math.min(...scores.map(s=>s.score));
    const winners=scores.filter(s=>s.score===min);
    if(winners.length===1) results.push({hole:h,pid:winners[0].pid,score:min});
  }
  return results;
}

function calcSettlement(parts,getCount,amountPerWin){
  // Each win = collect $amount from EVERY other participant
  // Net per player = (wins × amount × (n-1)) - (losses_to_others × amount)
  // Where losses_to_others = sum of other players' wins × amount
  const validParts=parts.filter(pid=>state.players.find(pl=>pl.id===pid));
  if(!validParts.length) return[];
  const n=validParts.length;
  const counts={};validParts.forEach(pid=>counts[pid]=getCount(pid));
  return validParts.map(pid=>{
    const p=state.players.find(pl=>pl.id===pid);
    const myWins=counts[pid];
    // Earn $amount from each other player for each of my wins
    const earned=myWins*(n-1)*amountPerWin;
    // Pay $amount to each other player for each of their wins
    const paid=validParts.filter(other=>other!==pid).reduce((s,other)=>s+counts[other]*amountPerWin,0);
    const net=earned-paid;
    return{pid,name:p?p.name:'?',count:myWins,earned,paid,net};
  }).sort((a,b)=>b.net-a.net);
}

function settlementSummary(settlements,icon){
  if(!settlements.length) return'';
  const rows=[];

  // Check if we have count-based data (pinnies/birdies/skins) or net-based (CTP with rollover)
  const hasCountData=settlements.some(s=>s.count>0);
  const ref=hasCountData?settlements.find(s=>s.paid>0&&settlements.filter(o=>o.pid!==s.pid).reduce((t,o)=>t+o.count,0)>0):null;
  const othersWins=ref?settlements.filter(o=>o.pid!==ref.pid).reduce((t,o)=>t+o.count,0):0;
  const amtPerWin=ref&&othersWins>0?ref.paid/othersWins:0;

  if(amtPerWin>0){
    // Count-based: payer owes payee (payee.count - payer.count) * amtPerWin
    for(let i=0;i<settlements.length;i++){
      for(let j=0;j<settlements.length;j++){
        if(i===j) continue;
        const payer=settlements[i], payee=settlements[j];
        const amt=(payee.count - payer.count)*amtPerWin;
        if(amt>0.005) rows.push(debtRow(payer.name,payee.name,amt));
      }
    }
  } else {
    // Net-based: use waterfall from net values (winners vs losers)
    const winners=settlements.filter(s=>s.net>0.005).map(s=>({...s}));
    const losers=settlements.filter(s=>s.net<-0.005).map(s=>({...s,net:-s.net}));
    let wi=0,li=0;
    while(wi<winners.length&&li<losers.length){
      const amt=Math.min(winners[wi].net,losers[li].net);
      if(amt>0.005) rows.push(debtRow(losers[li].name,winners[wi].name,amt));
      winners[wi].net-=amt; losers[li].net-=amt;
      if(winners[wi].net<0.005) wi++;
      if(losers[li].net<0.005) li++;
    }
  }

  if(!rows.length) return'';
  return`<div style="border-top:2px solid rgba(0,39,76,0.08);">
    <div style="padding:6px 12px 4px;font-size:10px;font-weight:bold;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-dim);">Settlement</div>
    ${rows.join('')}
  </div>`;
}

}

        <div style="flex:1;font-size:14px;font-weight:bold;color:var(--blue);">${p.name}</div>
        <div style="display:flex;align-items:center;gap:4px;margin-right:16px;">
          <span style="font-size:18px;">🚩</span>
          <span style="font-size:16px;font-weight:bold;color:var(--blue);">${count}</span>
        </div>
        <div style="font-size:15px;font-weight:bold;color:${winnings>0?'#1B5E20':'var(--text-muted)'};">${winnings>0?'+$'+winnings.toFixed(0):'$0'}</div>
      </div>`;
    }).join('');
    return`<div class="card" style="padding:0;overflow:hidden;margin-bottom:10px;">
      <div style="background:var(--blue);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;">
        <div style="display:flex;align-items:center;gap:8px;"><span style="font-size:18px;">🚩</span><span style="font-size:13px;font-weight:bold;color:#fff;text-transform:uppercase;letter-spacing:0.5px;">Pinnies</span></div>
        <span style="font-size:12px;color:var(--maize);">$${pool.amount||0}/pinnie · ${parts.length} players</span>
      </div>

    </div>`;
  }

  // ── CTP ──
  function ctpSection(){
    const pool=pools.ctp;if(!pool||!pool.active)return'';
    const parts=participantsOf('ctp');
    const amt=pool.amount||0;
    const {events,pendingCarryover}=ctpResults(amt);
    const n=parts.length;

    // Per-player net earnings
    const netByPid={};
    parts.forEach(pid=>netByPid[pid]=0);
    events.forEach(({ctp,multiplier})=>{
      if(!parts.includes(ctp)) return;
      const potWon=amt*multiplier*(n-1);
      netByPid[ctp]=(netByPid[ctp]||0)+potWon;
      parts.forEach(pid=>{if(pid!==ctp) netByPid[pid]=(netByPid[pid]||0)-amt*multiplier;});
    });

    const rows=parts.map(pid=>{
      const p=state.players.find(pl=>pl.id===pid);if(!p)return'';
      const count=playerCTPs(pid);
      const earned=netByPid[pid]>0?netByPid[pid]:0;
      return`<div style="display:flex;align-items:center;padding:10px 12px;border-bottom:1px solid rgba(0,39,76,0.06);">
        <div style="flex:1;font-size:14px;font-weight:bold;color:var(--blue);">${p.name}</div>
        <div style="display:flex;align-items:center;gap:4px;margin-right:16px;">
          <span style="font-size:18px;">⛳</span>
          <span style="font-size:16px;font-weight:bold;color:var(--blue);">${count}</span>
        </div>
        <div style="font-size:15px;font-weight:bold;color:${earned>0?'#1B5E20':'var(--text-muted)'};">${earned>0?'+$'+earned.toFixed(0):'$0'}</div>
      </div>`;
    }).join('');

    // Build settlement objects compatible with settlementSummary
    // settlementSummary uses count & derives amtPerWin from paid/totalOtherWins
    // For CTP with rollover, just pass net directly and use a sentinel count
    // Instead, build direct pair debts manually like pinnies
    const ctpSettlements=parts.map(pid=>{
      const p=state.players.find(pl=>pl.id===pid);
      const net=netByPid[pid]||0;
      // count = number of CTP wins, paid = what they owe others total
      const myWins=events.filter(e=>e.ctp===pid).reduce((s,e)=>s+e.multiplier,0);
      const paid=Math.max(0,-net); // total owed by this player
      const earned=Math.max(0,net);
      return{pid,name:p?p.name:'?',count:myWins,net,paid,earned};
    });

    // Pending carryover banner
    const carryBanner=pendingCarryover>0
      ?`<div style="display:flex;align-items:center;gap:8px;padding:8px 14px;background:rgba(255,203,5,0.12);border-bottom:1px solid rgba(255,203,5,0.2);">
          <span style="font-size:16px;">🔄</span>
          <span style="font-size:12px;font-weight:bold;color:var(--blue);">
            ${pendingCarryover} unclaimed par 3${pendingCarryover!==1?'s':''} — rolls to next par 3
            · Next winner collects <b>$${amt*(pendingCarryover+1)}</b> from each player
          </span>
        </div>`:'' ;

    return`<div class="card" style="padding:0;overflow:hidden;margin-bottom:10px;">
      <div style="background:var(--blue);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;">
        <div style="display:flex;align-items:center;gap:8px;"><span style="font-size:18px;">⛳</span><span style="font-size:13px;font-weight:bold;color:#fff;text-transform:uppercase;letter-spacing:0.5px;">Closest to Pin</span></div>
        <span style="font-size:12px;color:var(--maize);">$${amt}/CTP · ${parts.length} players</span>
      </div>
      ${carryBanner}
      ${rows||'<div style="padding:12px;font-size:12px;color:var(--text-muted);text-align:center;">No par 3 scores yet</div>'}
      ${settlementSummary(ctpSettlements,'⛳')}
    </div>`;
  }

  const anyPoolActive=Object.values(pools).some(p=>p&&p.active);

  function combinedSummary(){
    // Merge ALL pools + settled side bets into one net per player
    const netByName={}; // keyed by player name for side bets

    function addNet(pid,amt){
      const p=state.players.find(pl=>pl.id===pid);
      const key=p?p.name:pid;
      netByName[key]=(netByName[key]||0)+amt;
    }

    // Birdies
    if(pools.birdies&&pools.birdies.active){
      const bParts=participantsOf('birdies');
      calcSettlement(bParts,pid=>playerBirdies(pid),pools.birdies.amount||0)
        .forEach(s=>addNet(s.pid,s.net));
    }

    // Skins
    if(pools.skins&&pools.skins.active){
      const sParts=participantsOf('skins');
      const skinCounts={};sParts.forEach(pid=>skinCounts[pid]=0);
      state.matches.forEach((_,mi)=>{calcSkinsWinner(mi).forEach(({pid})=>{if(skinCounts[pid]!=null)skinCounts[pid]++;});});
      calcSettlement(sParts,pid=>skinCounts[pid]||0,pools.skins.amount||0)
        .forEach(s=>addNet(s.pid,s.net));
    }

    // Pinnies
    if(pools.pinnies&&pools.pinnies.active){
      const pParts=participantsOf('pinnies');
      calcSettlement(pParts,pid=>playerPinnies(pid),pools.pinnies.amount||0)
        .forEach(s=>addNet(s.pid,s.net));
    }

    // CTP
    if(pools.ctp&&pools.ctp.active){
      const ctpParts=participantsOf('ctp');
      const ctpAmt=pools.ctp.amount||0;
      const {events:ctpEvts}=ctpResults(ctpAmt);
      const ctpN=ctpParts.length;
      ctpEvts.forEach(({ctp,multiplier})=>{
        if(!ctpParts.includes(ctp)) return;
        addNet(ctp,ctpAmt*multiplier*(ctpN-1));
        ctpParts.forEach(pid=>{if(pid!==ctp) addNet(pid,-ctpAmt*multiplier);});
      });
    }

    // Settled side bets
    (state.bets||[]).filter(b=>b.settled&&b.winner!=='tie').forEach(b=>{
      const amt=b.amount||0;
      if(!amt) return;
      // winner collects from loser
      netByName[b.winner]=(netByName[b.winner]||0)+amt;
      const loser=b.winner===b.bettor?b.against:b.bettor;
      netByName[loser]=(netByName[loser]||0)-amt;
    });

    const names=Object.keys(netByName);
    if(!names.length) return'';
    const hasActivity=names.some(n=>Math.abs(netByName[n])>0.005);
    if(!hasActivity) return'';

    const combined=names.map(name=>({name,net:netByName[name]||0}));
    const winners=combined.filter(s=>s.net>0.005).sort((a,b)=>b.net-a.net).map(s=>({...s}));
    const losers=combined.filter(s=>s.net<-0.005).sort((a,b)=>a.net-b.net).map(s=>({...s,net:-s.net}));
    if(!winners.length||!losers.length) return'';
    const rows=[];
    let wi=0,li=0;
    while(wi<winners.length&&li<losers.length){
      const amt=Math.min(winners[wi].net,losers[li].net);
      if(amt>0.005) rows.push(debtRow(losers[li].name,winners[wi].name,amt));
      winners[wi].net-=amt; losers[li].net-=amt;
      if(winners[wi].net<0.005) wi++;
      if(losers[li].net<0.005) li++;
    }
    if(!rows.length) return'';

function addMatchBet(mi, label, type){
  const m=state.matches[mi];
  const amt=parseFloat((document.getElementById('mbet-amt')||{}).value)||10;
  const p1=mLabel(m,1), p2=mLabel(m,2);
  let desc=label;
  if(type==='custom'){
    desc=prompt('Bet description:')||label;
  }
  const betType=type==='total'?'stroke_net':type==='custom'?'custom':'stroke_net';
  // For front9/back9 bets, carryover if tied — store carryover flag
  const isF9=type==='front', isB9=type==='back';
  mutate(()=>{
    if(!state.bets) state.bets=[];
    state.bets.push({
      id:'b'+Date.now(),
      type:betType,
      description:desc+' — '+p1+' vs '+p2,
      bettor:p1, against:p2,
      bettorId:(m.team1Players||[])[0]||'',
      againstId:(m.team2Players||[])[0]||'',
      amount:amt,
      baseAmount:amt,
      notes:FORMATS[m.format]||m.format,
      settled:false,
      matchRef:m.id,
      segment:type,
      // Front 9 ties carry over to back 9
      carryoverTo:isF9?'back':null,
      carryoverFrom:isB9?'front':null,
    });
  });
  pushToCloud();
  openMatchBetModal(mi);
}

function saveBet(){
  const type=(document.getElementById('b-type')||{}).value||'custom';
  const desc=((document.getElementById('b-desc')||{}).value||'').trim();
  const p1id=(document.getElementById('b-p1')||{}).value||'';
  const p2id=(document.getElementById('b-p2')||{}).value||'';
  const amt=parseFloat((document.getElementById('b-amt')||{}).value)||0;
  const notes=((document.getElementById('b-notes')||{}).value||'').trim();
  if(!p1id||!p2id){alert('Please select both sides.');return;}
  if(p1id===p2id){alert('Select two different players/teams.');return;}
  function nameOf(id){if(id==='t1')return state.team1.name;if(id==='t2')return state.team2.name;const p=state.players.find(pl=>pl.id===id);return p?p.name:'?';}
  const bettor=nameOf(p1id),against=nameOf(p2id);
  const descFinal=desc||(bettor+' vs '+against);
  mutate(()=>state.bets.push({id:'b'+Date.now(),type,description:descFinal,bettor,against,bettorId:p1id,againstId:p2id,amount:amt,notes,settled:false}));
  modal=null;render();
}

function settleBet(i){
  const b=state.bets[i];
  modal=`<div class="modal" onclick="event.stopPropagation()">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;border-bottom:2px solid var(--maize);padding-bottom:10px;">
      <div class="modal-title">Settle Bet</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div style="padding:12px;background:rgba(0,39,76,0.04);border-radius:var(--radius);margin-bottom:16px;">
      <div style="font-size:14px;font-weight:bold;color:var(--blue);margin-bottom:4px;">${b.description}</div>
      <div style="font-size:12px;color:var(--text-muted);">$${b.amount} per side</div>
    </div>
    <div style="font-size:13px;font-weight:bold;color:var(--blue);margin-bottom:10px;">Who won?</div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <button class="btn btn-gold w-full" onclick="confirmSettle(${i},'${b.bettor.replace(/'/g,"\\'")}')">🏆 ${b.bettor}</button>
      <button class="btn btn-ghost w-full" onclick="confirmSettle(${i},'tie')">🤝 Tie / Push</button>
      <button class="btn btn-gold w-full" onclick="confirmSettle(${i},'${b.against.replace(/'/g,"\\'")}')">🏆 ${b.against}</button>
    </div>
  </div>`;
  render();
}

function confirmSettle(i,winner){
  mutate(()=>{
    const b=state.bets[i];
    b.settled=true;b.winner=winner;
    // Front 9 tie carries pot to back 9
    if(winner==='tie'&&b.carryoverTo){
      const back=state.bets.find(ob=>ob.matchRef===b.matchRef&&ob.segment===b.carryoverTo&&!ob.settled);
      if(back){
        back.amount=(back.amount||0)+(b.baseAmount||b.amount||0);
        if(!back.description.includes('(+carry)')) back.description=back.description.replace(' — ',' (+carry) — ');
      }
    }
  });
  modal=null;render();
}

function refreshQR(tIdx){
  const el=document.getElementById('qr-'+tIdx);
  if(!el) return;

function updHoleInd(mi,h,pi,inputId,v,par){
  const m=state.matches[mi];
  if(!m.holes[h]) m.holes[h]={};
  if(v===''||v==null){delete m.holes[h]['p'+pi];}
  else{m.holes[h]['p'+pi]=parseInt(v);}
  const cd=m.courseData||state.settings.courseData;
  const courseHole=cd&&cd.holes&&cd.holes[h-1]?cd.holes[h-1]:null;
  if(courseHole) m.holes[h].par=courseHole.par;
  else if(par) m.holes[h].par=par;

  // ── Roll up individual scores to linked team match ─────────────────────────
  rollUpToTeamMatch(mi, h);

  save();pushToCloud();
  // Update score cell class directly
  const el=document.getElementById(inputId);
  if(el) el.className='sc-input '+getScoreCls(v?parseInt(v):null,par);
  // Update out/total cells
  const pids=m.indPlayers||[];
  const players=pids.map(id=>state.players.find(p=>p.id===id)).filter(Boolean);
  players.forEach((_,pii)=>{
    let tot=0,any=false;
    for(const hh of matchHoles(m)){const hd=m.holes[hh]||{};if(hd['p'+pii]!=null){tot+=hd['p'+pii];any=true;}}
    const cel=document.getElementById('sc-tot-'+mi+'-'+pii);
    if(cel) cel.textContent=any?tot:'—';
  });
}

function rollUpToTeamMatch(indMatchIdx, h){
  const ind=state.matches[indMatchIdx];
  if(!ind||!ind.linkedFrom) return;

  // Also roll up 1v1 matches that are linked to this individual match
  if(!ind.is1v1){
    state.matches.forEach((m,mi)=>{
      if(m.is1v1&&(m.linkedFrom===ind.id||m.parentIndMatch===ind.id)){
        rollUp1v1FromInd(mi,ind,h);
      }
    });
  }
  // Find the parent team match
  const teamIdx=state.matches.findIndex(m=>m.id===ind.linkedFrom);
  if(teamIdx<0) return;
  const team=state.matches[teamIdx];
  if(!team) return;

  const pids=ind.indPlayers||[];
  const players=pids.map(id=>state.players.find(p=>p.id===id)).filter(Boolean);
  const sides=ind.indPlayerSides||{};
  const hd=ind.holes[h]||{};
  const coursePar=(ind.courseData||state.settings.courseData)?.holes?.[h-1]?.par||hd.par||4;
  const si=holeSI(ind,h);
  const minH=players.length?Math.min(...players.map(p=>p.handicap||0)):0;
  const diffs=players.map(p=>Math.round(((p.handicap||0)-minH)*(ind.hdcpPercent||100)/100));

  // For each team side, find the best (lowest) net score from their players
  const t1pids=team.team1Players||[];
  const t2pids=team.team2Players||[];

  // For Four-Ball/Best Ball: use BEST net score per team
  // For other formats: use combined (sum) net score
  const isBestBall=['fourball','bestball'].includes((ind.format||team.format||'').toLowerCase());
  function bestOrCombinedNet(sidePids){
    let best=null, combined=null;
    sidePids.forEach(pid=>{
      const pi=pids.indexOf(pid);
      if(pi<0) return;
      const raw=hd['p'+pi];
      if(raw==null) return;
      const net=raw-strokesOn(diffs[pi],si,ind.totalHoles);
      if(best===null||net<best) best=net;
      combined=(combined||0)+net;
    });
    return isBestBall?best:combined;
  }

  const t1net=bestOrCombinedNet(t1pids);
  const t2net=bestOrCombinedNet(t2pids);

  if(!team.holes[h]) team.holes[h]={par:coursePar};
  team.holes[h].par=coursePar;
  // Store combined net — team match win/loss compares these directly (no extra hDiff needed)
  if(t1net!==null) team.holes[h].t1=t1net;
  else delete team.holes[h].t1;
  if(t2net!==null) team.holes[h].t2=t2net;
  else delete team.holes[h].t2;
}

function rerollAllHoles(indMatchIdx){
  const m=state.matches[indMatchIdx];
  if(!m) return;
  const holes=matchHoles(m);
  holes.forEach(h=>rollUpToTeamMatch(indMatchIdx,h));
  save();pushToCloud();render();
}


function rollUp1v1FromInd(matchIdx, indMatch, h){
  // Copy the two 1v1 players' scores from the parent individual match
  const m=state.matches[matchIdx];
  if(!m||!m.is1v1) return;
  const pids=m.indPlayers||[];
  if(pids.length!==2) return;
  const indHd=(indMatch.holes||{})[h];if(!indHd) return;
  const indPids=indMatch.indPlayers||[];

  if(!m.holes[h]) m.holes[h]={};
  const ch=(indMatch.courseData||state.settings.courseData)?.holes?.[h-1];
  if(ch) m.holes[h].par=ch.par;

  pids.forEach((pid,pi)=>{
    const indPi=indPids.indexOf(pid);
    if(indPi<0) return;
    const raw=indHd['p'+indPi];
    if(raw!=null) m.holes[h]['p'+pi]=raw;
    else delete m.holes[h]['p'+pi];
  });
}
