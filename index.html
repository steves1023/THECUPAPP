function readCourseBuilder(){
  const name=(document.getElementById('cb-name')||{}).value||'';
  const location=(document.getElementById('cb-loc')||{}).value||'';
  const holeCount=parseInt((document.getElementById('cb-holes')||{}).value||18);
  const teeNames=[0,1,2,3].map(i=>(document.getElementById('cb-tee-'+i)||{}).value||'').filter(Boolean);
  const holes=[];let total_par=0;
  for(let i=0;i<holeCount;i++){
    const par=parseInt((document.getElementById('cb-par-'+i)||{}).value)||4;
    const handicap=parseInt((document.getElementById('cb-si-'+i)||{}).value)||i+1;
    const tees=teeNames.map((_,ti)=>{const v=(document.getElementById('cb-y-'+i+'-'+ti)||{}).value;return v?parseInt(v):null;});
    total_par+=par;
    holes.push({number:i+1,par,handicap,yards:tees[0]||0,tees});
  }
  return{name,location,total_par,holes,tees:teeNames};
}

function saveCourseBuilder(fs,editIdx){
  const course=readCourseBuilder();
  if(!course.name){alert('Please enter a course name.');return;}
  mutate(()=>{
    if(!state.savedCourses) state.savedCourses=[];
    const save={...course,id:'c'+Date.now()};
    if(editIdx!=null) state.savedCourses[editIdx]={...save,id:state.savedCourses[editIdx].id};
    else state.savedCourses.push(save);
    if(fs) state.settings.courseData=course;
    else if(matchDraft) matchDraft.courseData=course;
  });
  modal=null;
  if(fs) openSettingsModal(); else render();
}

function useCourseBuilderNow(fs,editIdx){
  const course=readCourseBuilder();

  mutate(()=>{if(fs) state.settings.courseData=course;else if(matchDraft) matchDraft.courseData=course;});

}

  if(!el) return;
  if(!q.trim()){
    el.innerHTML='<div style="font-size:12px;color:var(--text-muted);font-family:Arial;padding:6px 0;">Type a course name and tap Search.</div>';
    return;
  }
  el.innerHTML='<div style="font-size:12px;color:var(--text-muted);font-family:Arial;padding:8px 0;"><span class="spinner"></span> Searching...</div>';
  const bel=document.getElementById('cbuiltin');
  if(bel) bel.innerHTML='';
  try{
    const res=await fetch('/.netlify/functions/golf?action=search&q='+encodeURIComponent(q));
    if(!res.ok) throw new Error('API '+res.status);
    const data=await res.json();
    const courses=(data.courses||[]).slice(0,20);
    if(!courses.length){
      el.innerHTML='<div style="font-size:12px;color:var(--text-muted);font-family:Arial;padding:8px 0;text-align:center;">No results for "'+q+'". Try a different name or city.</div>';
      renderBuiltinList(fs,q);
      return;
    }
    el.innerHTML='<div style="font-size:11px;color:var(--text-muted);font-family:Arial;margin-bottom:6px;">'+courses.length+' result'+(courses.length!==1?'s':'')+' — tap to select</div>'
      +'<div style="background:#fff;border-radius:var(--radius);overflow:hidden;border:1px solid rgba(0,39,76,0.12);max-height:320px;overflow-y:auto;">'
      +courses.map(c=>{
        // Parse location — may be a string, object, or nested object
        let _city='',_state='',_country='';
        try{
          const raw=c.location;
          const _loc=typeof raw==='string'?JSON.parse(raw):(raw&&typeof raw==='object'?raw:{});
          _city=_loc.city||_loc.City||'';
          _state=_loc.state_name||_loc.state||_loc.State||_loc.province||'';
          _country=_loc.country||_loc.Country||'';
        }catch(e){
          _city=typeof c.city==='string'?c.city:'';
          _state=typeof c.state_name==='string'?c.state_name:typeof c.state==='string'?c.state:'';
          _country=typeof c.country==='string'?c.country:'';
        }
        const loc=[_city,_state,_country].filter(Boolean).join(', ');
        // tees can be {male:[...], female:[...]} or a flat array
        const maleTees=c.tees?(Array.isArray(c.tees)?c.tees:(c.tees.male||[])):[];
        const par=maleTees.length&&maleTees[0].par_total?maleTees[0].par_total:'';
        const teeNames=maleTees.slice(0,5).map(t=>t.tee_name||'').filter(Boolean).join(' · ');
        const key=_cacheCourse(c);
        return '<div class="course-result-item" data-ckey="'+key+'" data-fs="'+(fs?1:0)+'" onclick="_clickApiCourse(this)" style="cursor:pointer;padding:12px 14px;border-bottom:1px solid rgba(0,39,76,0.06);">'
          +'<div style="font-weight:bold;font-size:14px;color:var(--blue);margin-bottom:2px;">'+c.club_name+'</div>'
          +(loc?'<div style="font-size:12px;color:var(--text-muted);font-family:Arial;margin-bottom:4px;">📍 '+loc+'</div>':'')
          +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">'
          +(par?'<span style="font-size:12px;font-weight:bold;color:var(--blue);font-family:Arial;background:rgba(0,39,76,0.07);padding:1px 7px;border-radius:10px;">Par '+par+'</span>':'')
          +(teeNames?'<span style="font-size:11px;color:var(--text-dim);font-family:Arial;">'+teeNames+'</span>':'')
          +'</div>'
          +'</div>';
      }).join('')
      +'</div>';
  }catch(err){
    el.innerHTML='';
    renderBuiltinList(fs,q);
  }
}

function renderBuiltinList(fs,q){
  const el=document.getElementById('cbuiltin');
  if(!el) return;
  const saved=(state.savedCourses||[]).map(c=>({...c,_saved:true}));
  const builtin=BUILTIN_COURSES.map(c=>({...c,_saved:false}));
  const all=[...saved,...builtin];
  const qL=(q||'').toLowerCase();
  const results=qL.length>1?all.filter(c=>(c.name+' '+(c.location||'')).toLowerCase().includes(qL)):all;
  if(!results.length){el.innerHTML='';return;}
  el.innerHTML='<div style="font-size:11px;color:var(--text-muted);font-family:Arial;margin:8px 0 4px;">Built-in courses'+(qL?' matching "'+q+'"':'')+'</div>'
    +'<div style="background:#fff;border-radius:var(--radius);overflow:hidden;border:1px solid rgba(0,39,76,0.12);max-height:200px;overflow-y:auto;">'
    +results.map(c=>{
      const isSaved=c._saved;
      const idx=isSaved?(state.savedCourses||[]).findIndex(s=>s.id===c.id):-1;
      const key=_cacheCourse(c);
      return '<div class="course-result-item" style="display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid rgba(0,39,76,0.06);">'
        +'<div style="flex:1;cursor:pointer;" data-ckey="'+key+'" data-fs="'+(fs?1:0)+'" onclick="_clickBuiltinCourse(this)">'
          +'<div style="font-weight:bold;font-size:14px;color:var(--blue);margin-bottom:2px;">'+c.name+(isSaved?' <span style="font-size:9px;padding:1px 5px;background:rgba(0,39,76,0.1);color:var(--blue);border-radius:10px;">Saved</span>':'')+'</div>'
          +(c.location?'<div style="font-size:12px;color:var(--text-muted);font-family:Arial;margin-bottom:4px;">📍 '+c.location+'</div>':'')
          +(c.total_par?'<div><span style="font-size:12px;font-weight:bold;color:var(--blue);font-family:Arial;background:rgba(0,39,76,0.07);padding:1px 7px;border-radius:10px;">Par '+c.total_par+'</span></div>':'')
        +'</div>'
        +(isSaved?'<div style="display:flex;gap:4px;">'
          +'<button class="btn btn-sm btn-ghost" style="font-size:10px;" onclick="editSavedCourse('+idx+','+(fs?1:0)+')">Edit</button>'
          +'<button class="btn btn-sm btn-ghost" style="font-size:10px;color:#C0392B;" onclick="deleteSavedCourse('+idx+')">✕</button>'
          +'</div>':'')
        +'</div>';
    }).join('')+'</div>';
}


async function applyApiCourse(keyOrJson,fs){
  const raw=_courseCache[keyOrJson]||JSON.parse(keyOrJson);
  const el=document.getElementById('cresults');
  if(el) el.innerHTML='<div style="font-size:12px;color:var(--text-muted);font-family:Arial;padding:8px;"><span class="spinner"></span> Loading course details...</div>';
  try{
    const res=await fetch('/.netlify/functions/golf?action=course&id='+raw.id);
    if(!res.ok) throw new Error('API '+res.status);
    const data=await res.json();
    const c=data.course||data||raw;

    // GolfCourseAPI returns tees as {male:[...], female:[...]}
    // Flatten all tees into a single array, prefer male tees first
    const rawTees=c.tees||{};
    const maleTees=Array.isArray(rawTees)?rawTees:(rawTees.male||[]);
    const femaleTees=Array.isArray(rawTees)?[]:(rawTees.female||[]);
    // Deduplicate: prefer male tees, add female only if name not already present
    const seenNames=new Set();
    const allTees=[...maleTees,...femaleTees].filter(t=>{
      const name=(t.tee_name||t.name||'').trim();
      if(!name||seenNames.has(name.toLowerCase())) return false;
      seenNames.add(name.toLowerCase());
      return true;
    });

    if(!allTees.length){
      throw new Error('No tee data');
    }

    // Build tee name list
    const teeNames=allTees.map(t=>t.tee_name||t.name||'Tee');

    // Use first tee as reference for par/handicap (same across tees)
    const refTee=allTees[0];
    const refHoles=(refTee.holes||[]).slice().sort((a,b)=>(a.number||0)-(b.number||0));
    const numHoles=refHoles.length||18;

    // Build hole data — par & handicap from ref tee, yardage per tee
    const holes=refHoles.map((h,i)=>({
      number:h.number||i+1,
      par:h.par||4,
      handicap:h.handicap||i+1,
      yards:h.yardage||0,
      // tees array: yardage for each tee in allTees order
      tees:allTees.map(t=>{
        const th=(t.holes||[]).find(hh=>(hh.number||0)===(h.number||i+1));
        return th?(th.yardage||0):0;
      })
    }));

    const total_par=refTee.par_total||holes.reduce((s,h)=>s+h.par,0)||72;

    // Build rating/slope per tee for display
    const teeInfo=allTees.map((t,ti)=>{
      // Calculate total yards from holes if not provided at tee level
      const calcYards=holes.reduce((s,h)=>s+(h.tees&&h.tees[ti]?h.tees[ti]:0),0);
      return{
        name:t.tee_name||t.name||'',
        rating:t.course_rating||0,
        slope:t.slope_rating||0,
        total_yards:t.total_yards||calcYards||0
      };
    });

    const course={
      name:c.club_name||raw.club_name,
      location:[c.location?.city||c.city,c.location?.state||c.state_name||c.country].filter(Boolean).join(', '),
      total_par,
      holes,
      tees:teeNames,
      teeInfo,
      numHoles,
      _apiId:raw.id
    };
    applyCourse(JSON.stringify(course),fs);
  }catch(err){
    console.warn('Course detail fetch failed:',err);
    // Fall back to search result data with no hole detail
    const fallback={
      name:raw.club_name,
      location:[raw.city,raw.state_name||raw.country].filter(Boolean).join(', '),
      total_par:raw.tees&&(raw.tees.male||raw.tees)[0]?(raw.tees.male||raw.tees)[0].par_total:72,
      holes:[],tees:[]
    };
    applyCourse(JSON.stringify(fallback),fs);
  }
}
</script>
